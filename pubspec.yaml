name: ScanOnly
description: A free document scanner app like CamScanner

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Scanning & Document Processing
  camera: ^0.10.5
  cunning_document_scanner: ^1.0.5
  file_picker: ^8.0.0
  mobile_scanner: ^5.0.0

  # AI - Offline ML Kit
  google_mlkit_text_recognition: ^0.13.0
  google_mlkit_translation: ^0.10.0
  google_mlkit_object_detection: ^0.13.0
  google_mlkit_face_detection: ^0.10.0
  google_mlkit_barcode_scanning: ^0.12.0
  math_expressions: ^2.4.0

  # PDF Tools
  pdf: ^3.10.8
  printing: ^5.12.0
  pdfx: ^2.6.0

  # Image Editing
  image: ^4.1.7
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Storage & Database
  sqflite: ^2.3.3
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  path: ^1.9.0
  shared_preferences: ^2.3.3

  # Security & Authentication
  local_auth: ^2.2.0

  # Sharing & Notifications
  share_plus: ^10.1.3
  flutter_local_notifications: ^17.0.0
  open_filex: ^4.5.0

  # Document Conversion
  excel: ^4.0.3

  # Permissions
  permission_handler: ^11.3.1

  # UI & Design
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.3
  iconsax: ^0.0.8
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0

  # Email (Optional - for sharing)
  mailer: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  generate: true

flutter_launcher_icons:
  image_path: "assets/images/launcher_icon.png"
  android:
    notification_icon: "ic_notification"
    adaptive_icon_background: "#1e3a5f"
    adaptive_icon_foreground: "assets/images/launcher_icon.png"
  ios:
    image_path: "assets/images/launcher_icon.png"
